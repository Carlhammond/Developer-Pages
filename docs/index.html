<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Carl Hammond – Developer Pages</title>
  <style>
    :root {
      --text: #1c1c1e;
      --muted: #6b6b70;
      --accent: #0a5cff;
      --rule: #e3e3e8;
      --bg: #ffffff;
      --card: #f7f7fa;
    }
    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 17px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 48px 24px 96px;
    }
    header {
      border-bottom: 1px solid var(--rule);
      padding-bottom: 24px;
      margin-bottom: 32px;
    }
    h1 {
      font-size: 2rem;
      line-height: 1.2;
      margin: 0 0 8px;
      letter-spacing: -0.02em;
    }
    h2 {
      font-size: 1.1rem;
      margin: 32px 0 12px;
      letter-spacing: -0.01em;
    }
    p { color: var(--text); margin: 0 0 12px; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .meta { color: var(--muted); font-size: 0.95rem; margin: 0; }
    ul { padding-left: 1.3em; margin: 0; }
    li { margin: 6px 0; }
    footer {
      margin-top: 56px;
      padding-top: 24px;
      border-top: 1px solid var(--rule);
      color: var(--muted);
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Developer Pages</h1>
      <p class="meta">Carl Hammond</p>
    </header>

    <p>This site hosts supporting documents for apps published on the Apple App Store.</p>

    <h2>Privacy Policies</h2>
    <ul>
      <li><a href="Marble-Solitaire-Swift/privacy.html">Marble Solitaire</a></li>
    </ul>

    <footer>
      &copy; 2026 Carl Hammond
    </footer>
  </main>
</body>
</html>
